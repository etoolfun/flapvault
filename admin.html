<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlapVault 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#c9a962',
            primaryDark: '#a68c4a',
            primaryLight: '#d4b87a',
            text: '#1a1a1a',
            textLight: '#666666',
            textLighter: '#999999',
            border: '#e5e5e5',
            borderLight: '#f0f0f0'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b border-border sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-primaryDark flex items-center justify-center">
          <i class="fas fa-shield-alt text-white text-sm"></i>
        </div>
        <h1 class="text-sm font-bold bg-gradient-to-r from-primaryDark to-primary bg-clip-text text-transparent">FlapVault 管理后台</h1>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="location.href='index.html'" class="text-xs text-textLight hover:text-primary flex items-center gap-1">
          <i class="fas fa-eye"></i> 预览
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-4">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h2 class="text-lg font-bold text-text">金库列表</h2>
        <p class="text-xs text-textLighter">共 <span id="vaultCount">0</span> 个金库</p>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="testGitHubConnection()" class="px-3 py-1.5 border border-border text-textLight text-xs rounded-lg hover:bg-gray-50 flex items-center gap-1">
          <i class="fas fa-check-circle"></i> 测试连接
        </button>
        <button onclick="addVault()" class="px-3 py-1.5 bg-primary text-white text-xs rounded-lg hover:bg-primaryDark transition-colors flex items-center gap-1">
          <i class="fas fa-plus"></i> 添加金库
        </button>
      </div>
    </div>

    <div id="vaultList" class="space-y-2">
    </div>
  </main>

  <div id="modal" class="fixed inset-0 bg-black/50 z-50 hidden">
    <div class="bg-white h-full flex flex-col">
      <div class="p-3 border-b border-border flex items-center justify-between flex-shrink-0">
        <h3 class="text-sm font-semibold" id="modalTitle">添加金库</h3>
        <button onclick="closeModal()" class="text-textLighter hover:text-text p-1">
          <i class="fas fa-times text-sm"></i>
        </button>
      </div>
      <div class="flex-1 overflow-y-auto p-3 space-y-3">
        <div>
          <label class="block text-xs font-medium mb-1">金库名称</label>
          <input type="text" id="vaultName" placeholder="输入金库名称" class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:border-primary focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">简介</label>
          <input type="text" id="vaultDescription" placeholder="输入金库简介" class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:border-primary focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">工厂合约地址</label>
          <input type="text" id="vaultFactory" placeholder="输入合约地址" class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:border-primary focus:outline-none font-mono text-xs">
        </div>
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-medium">参数配置</label>
            <button onclick="addParam()" class="text-xs text-primary hover:text-primaryDark flex items-center gap-1">
              <i class="fas fa-plus"></i> 添加
            </button>
          </div>
          <div id="paramsContainer" class="space-y-2">
          </div>
        </div>
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-medium">功能特性</label>
            <button onclick="addFeature()" class="text-xs text-primary hover:text-primaryDark flex items-center gap-1">
              <i class="fas fa-plus"></i> 添加
            </button>
          </div>
          <div id="featuresContainer" class="space-y-2">
          </div>
        </div>
      </div>
      <div class="p-3 border-t border-border flex items-center justify-end gap-2 flex-shrink-0">
        <button onclick="closeModal()" class="px-4 py-2 border border-border text-textLight text-xs rounded-lg hover:bg-gray-50">取消</button>
        <button onclick="saveVault()" class="px-4 py-2 bg-primary text-white text-xs rounded-lg hover:bg-primaryDark">保存</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_CONFIG = {
      vaultUrl: 'https://raw.githubusercontent.com/etoolfun/flapvault/main/vault.json',
      token: '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',
      repo: 'etoolfun/flapvault',
      branch: 'main'
    };

    let vaults = [];
    let editingIndex = -1;
    let githubConfig = { ...DEFAULT_CONFIG };

    function loadConfig() {
      githubConfig = { ...DEFAULT_CONFIG };
    }

    async function testGitHubConnection() {
      loadConfig();
      const token = githubConfig.token.trim();
      const headers = {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github.v3+json'
      };
      
      try {
        const response = await fetch(
          `https://api.github.com/repos/${githubConfig.repo}/contents/vault.json?ref=${githubConfig.branch}`,
          { headers }
        );
        
        console.log('测试连接状态:', response.status);
        
        if (response.ok) {
          alert('✅ GitHub 连接成功！\n\n可以正常同步数据到 GitHub。');
        } else if (response.status === 404) {
          alert('⚠️ 文件不存在，首次同步会新建文件。');
        } else if (response.status === 401) {
          alert('❌ Token 无效或已过期！\n\n请重新生成 GitHub Token。');
        } else if (response.status === 403) {
          alert('❌ 权限不足！\n\n请确保 Token 有 repo 权限。');
        } else {
          const error = await response.json();
          alert(`❌ 连接失败！\n\n状态: ${response.status}\n错误: ${error.message}`);
        }
      } catch (error) {
        alert(`❌ 连接失败！\n\n${error.message}`);
      }
    }

    async function loadVaults() {
      loadConfig();
      try {
        const vaultUrl = localStorage.getItem('vaultUrl') || githubConfig.vaultUrl || 'vault.json';
        const response = await fetch(vaultUrl + '?t=' + Date.now(), {
          mode: 'cors',
          cache: 'no-cache'
        });
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        vaults = await response.json();
        renderVaults();
        document.getElementById('vaultCount').textContent = vaults.length;
      } catch (error) {
        console.error('Failed to load vaults:', error);
        document.getElementById('vaultList').innerHTML = `
          <div class="text-center py-8 text-textLighter">
            <i class="fas fa-exclamation-circle text-4xl mb-2"></i>
            <p>加载金库数据失败</p>
            <p class="text-xs mt-2">${error.message}</p>
          </div>
        `;
      }
    }

    function renderVaults() {
      const container = document.getElementById('vaultList');
      container.innerHTML = '';
      
      vaults.forEach((vault, index) => {
        const item = document.createElement('div');
        item.className = 'bg-white rounded-lg border border-borderLight p-3 flex items-center justify-between';
        item.innerHTML = `
          <div class="flex items-center gap-3 flex-1 min-w-0">
            <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center flex-shrink-0">
              <i class="fas fa-box text-primary text-xs"></i>
            </div>
            <div class="min-w-0">
              <h4 class="text-sm font-medium text-text truncate">${vault.name}</h4>
              <p class="text-xs text-textLighter truncate">${vault.description}</p>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <button onclick="editVault(${index})" class="p-1.5 text-textLighter hover:text-primary hover:bg-primary/5 rounded transition-colors">
              <i class="fas fa-edit text-xs"></i>
            </button>
            <button onclick="deleteVault(${index})" class="p-1.5 text-textLighter hover:text-red-500 hover:bg-red-50 rounded transition-colors">
              <i class="fas fa-trash text-xs"></i>
            </button>
          </div>
        `;
        container.appendChild(item);
      });
    }

    function addVault() {
      editingIndex = -1;
      document.getElementById('modalTitle').textContent = '添加金库';
      document.getElementById('vaultName').value = '';
      document.getElementById('vaultDescription').value = '';
      document.getElementById('vaultFactory').value = '';
      document.getElementById('paramsContainer').innerHTML = '';
      document.getElementById('featuresContainer').innerHTML = '';
      addParam();
      addFeature();
      document.getElementById('modal').classList.remove('hidden');
    }

    function editVault(index) {
      editingIndex = index;
      const vault = vaults[index];
      document.getElementById('modalTitle').textContent = '编辑金库';
      document.getElementById('vaultName').value = vault.name;
      document.getElementById('vaultDescription').value = vault.description;
      document.getElementById('vaultFactory').value = vault.factory;
      
      const paramsContainer = document.getElementById('paramsContainer');
      paramsContainer.innerHTML = '';
      vault.params.forEach(param => addParam(param.name, param.value, param.description));
      
      const featuresContainer = document.getElementById('featuresContainer');
      featuresContainer.innerHTML = '';
      vault.features.forEach(feature => addFeature(feature));
      
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function addParam(name = '', value = '', desc = '') {
      const container = document.getElementById('paramsContainer');
      const div = document.createElement('div');
      div.className = 'space-y-2 p-2 bg-gray-50 rounded-lg';
      div.innerHTML = `
        <div class="flex gap-2 items-center">
          <input type="text" placeholder="参数名" value="${name}" class="flex-1 px-2 py-1.5 border border-border rounded text-xs focus:border-primary focus:outline-none">
          <input type="text" placeholder="值" value="${value}" class="flex-1 px-2 py-1.5 border border-border rounded text-xs focus:border-primary focus:outline-none">
          <button onclick="this.parentElement.parentElement.remove()" class="p-1.5 text-textLighter hover:text-red-500">
            <i class="fas fa-minus text-xs"></i>
          </button>
        </div>
        <input type="text" placeholder="描述" value="${desc}" class="w-full px-2 py-1.5 border border-border rounded text-xs focus:border-primary focus:outline-none">
      `;
      container.appendChild(div);
    }

    function addFeature(text = '') {
      const container = document.getElementById('featuresContainer');
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-center';
      div.innerHTML = `
        <input type="text" placeholder="功能特性" value="${text}" class="flex-1 px-2 py-1.5 border border-border rounded text-xs focus:border-primary focus:outline-none">
        <button onclick="this.parentElement.remove()" class="p-1.5 text-textLighter hover:text-red-500">
          <i class="fas fa-minus text-xs"></i>
        </button>
      `;
      container.appendChild(div);
    }

    async function saveVault() {
      const name = document.getElementById('vaultName').value.trim();
      if (!name) {
        alert('请输入金库名称');
        return;
      }

      const params = [];
      document.querySelectorAll('#paramsContainer > div').forEach(div => {
        const inputs = div.querySelectorAll('input');
        const paramName = inputs[0].value.trim();
        if (paramName) {
          params.push({
            name: paramName,
            value: inputs[1].value.trim(),
            description: inputs[2].value.trim()
          });
        }
      });

      const features = [];
      document.querySelectorAll('#featuresContainer > div').forEach(div => {
        const text = div.querySelector('input').value.trim();
        if (text) features.push(text);
      });

      const vault = {
        name,
        description: document.getElementById('vaultDescription').value.trim(),
        factory: document.getElementById('vaultFactory').value.trim(),
        params,
        features
      };

      if (editingIndex >= 0) {
        vaults[editingIndex] = vault;
      } else {
        vaults.push(vault);
      }

      renderVaults();
      document.getElementById('vaultCount').textContent = vaults.length;
      closeModal();

      loadConfig();
      console.log('当前配置:', githubConfig);
      const result = await updateGitHubFile(JSON.stringify(vaults, null, 2));
      if (result.success) {
        alert(`✅ 保存成功！\n\n${result.message}`);
      } else {
        alert(`⚠️ 保存失败！\n\n${result.message}\n\n请检查：\n1. GitHub Token 是否正确\n2. 仓库路径是否正确\n3. Token 是否有 repo 权限`);
      }
    }

    async function deleteVault(index) {
      if (confirm('确定删除？')) {
        vaults.splice(index, 1);
        renderVaults();
        document.getElementById('vaultCount').textContent = vaults.length;
      
        loadConfig();
        const result = await updateGitHubFile(JSON.stringify(vaults, null, 2));
        if (result.success) {
          alert(`✅ 删除成功！\n\n${result.message}`);
        } else {
          alert(`⚠️ 删除成功（本地）！\n\n${result.message}\n\n请检查：\n1. GitHub Token 是否正确\n2. 仓库路径是否正确\n3. Token 是否有 repo 权限`);
        }
      }
    }

    async function updateGitHubFile(content) {
      if (!githubConfig.token) {
        return { success: false, message: '请先配置 GitHub Token' };
      }
      if (!githubConfig.repo) {
        return { success: false, message: '请先配置 GitHub 仓库路径' };
      }

      const token = githubConfig.token.trim();
      console.log('Token长度:', token.length);

      try {
        console.log('GitHub配置:', githubConfig);
        
        const headers = {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github.v3+json'
        };
        
        const getShaResponse = await fetch(
          `https://api.github.com/repos/${githubConfig.repo}/contents/vault.json?ref=${githubConfig.branch}`,
          { headers }
        );
        
        console.log('获取SHA状态:', getShaResponse.status);
        
        let sha = '';
        if (getShaResponse.ok) {
          const existing = await getShaResponse.json();
          sha = existing.sha;
          console.log('获取到SHA:', sha);
        } else if (getShaResponse.status === 404) {
          console.log('文件不存在，新建文件');
        } else {
          const error = await getShaResponse.json();
          console.log('获取SHA失败:', error);
          return { success: false, message: `获取文件信息失败: ${error.message || getShaResponse.status}` };
        }

        const encodedContent = btoa(unescape(encodeURIComponent(content)));

        const putResponse = await fetch(
          `https://api.github.com/repos/${githubConfig.repo}/contents/vault.json`,
          {
            method: 'PUT',
            headers: {
              ...headers,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: 'Update vault data via admin panel',
              content: encodedContent,
              sha,
              branch: githubConfig.branch
            })
          }
        );

        console.log('PUT状态:', putResponse.status);
        
        if (putResponse.ok) {
          return { success: true, message: 'GitHub 文件已更新，Netlify 将自动重新部署' };
        } else {
          const error = await putResponse.json();
          console.error('GitHub API错误:', error);
          let errorMsg = `GitHub API 错误: ${putResponse.status}`;
          if (error.message) errorMsg += ` - ${error.message}`;
          if (error.errors) errorMsg += `\n详细错误: ${JSON.stringify(error.errors)}`;
          return { success: false, message: errorMsg };
        }
      } catch (error) {
        console.error('GitHub更新异常:', error);
        return { success: false, message: `GitHub 更新失败: ${error.message}` };
      }
    }

    loadVaults();
  </script>
</body>
</html>
